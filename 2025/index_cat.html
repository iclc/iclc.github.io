    <!-- About-->
    <section class="about-section" id="about">
      <script>
	

	paragraph('about', 'Tema: Liveness (Vivacitat)',
		  `<p>Han passat deu anys des de la primera convocatòria de participació de l'ICLC, que proposava "[...] explorar la vivacitat (liveness) en abstraccions simbòliques i comprendre les conseqüències perceptives, creatives, productives, filosòfiques i culturals". En la dècada següent, hem experimentat col·lectivament i col·laborativament amb diversos nivells d'abstracció de codificació en directe, hem desenvolupat llenguatges específics de domini i hem explorat els nivells d'agència que ofereixen els models creats manualment o, de vegades, amb l'ajuda d'algoritmes d'aprenentatge. Hem inventat i jugat amb nombroses interfícies per interactuar amb els algoritmes i el món que ens envolta durant les actuacions. Aquestes exploracions giren al voltant de definir quins processos realment volem mostrar i en quins formats volem expressar-los, mentre "pensem algorítmicament" amb un públic.</p>

<p>En aquesta 9a edició de la conferència, convidem la comunitat a reflexionar sobre la vivacitat i les seves múltiples formes i conseqüències dins del live coding. Creiem que la tensió entre allò que és viu i allò que no ho és és un element clau del live coding. Quins efectes té en els processos, les tecnologies i les formes de la performance? Com ​​impacten i transformen les múltiples formes de vivacitat la hibridació entre allò digital/algorítmic i allò material? Com ​​es relaciona la vivacitat amb i/o defineix els aspectes socioculturals de les comunitats de live coding?</p>

	<p>L'ICLC 2025 va convidar a propostes relacionades amb el tema d'enguany, vivacitat (liveness), tal com es destaca en qualsevol dels següents o fins i tot en algun altre tema:

	  <ul>
	    <li>Liveness en els contextos socials i culturals del live coding</li>
	    <li>Liveness i algoritmes</li>
	    <li>Liveness i interfícies</li>
	    <li>Liveness i llunyania</li>
	    <li>Liveness i agents de programari</li>
	    <li>Llenguatges de live coding que integren altres vocabularis artístics</li>
	    <li>Formes d'expressió artística que integren el live coding</li>
	    <li>Interfícies híbrides i eines fora de pantalla en el rendiment del live coding</li>
	    <li>Hibridació entre el digital i el material en les pràctiques de codificació en directe</li>
	    <li>Creació i manteniment de comunitats de codificació en directe</li>
	    <li>L'estat social del live coding: diversitat, equitat, inclusió i el manifest TOPLAP després de 10 anys d'ICLC</li>
	    <li>Accessibilitat en llenguatges, interfícies i actuacions de codificació en directe</li>
	  </ul>
	Deu anys després del primer ICLC, animem la nostra comunitat a aprofitar els seus punts forts multidisciplinaris i descobrir nous límits per descobrir, expandir o mutar.</p>

	<p class="mt-5">Accordingly, the 2025 program will take shape along the lines of the following session topics:
	  <a href="#session2">Eines especialitzades i DSLs</a>,
	  <a href="#session1">Live Coding més enllà dels ordinadors i les interfícies</a>, 
	  <a href="#session3">Live Coding audiovisual</a>, 
	  <a href="#session4">Futurs especulatius</a>, 
	  <a href="#session5">Comunitats i pràctiques artístiques</a>,
	  <a href="#session6">Live Coding col·laboratiu</a>.`
	  );
      </script>
      <br>
